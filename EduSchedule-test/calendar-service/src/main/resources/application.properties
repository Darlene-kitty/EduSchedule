spring.application.name=calendar-service
server.port=8092

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/eduschedule_calendar?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Calendar Integration Configuration
calendar.google.enabled=true
calendar.outlook.enabled=true
calendar.sync.interval=300000

# Logging
logging.level.cm.iusjc.calendar=DEBUG
logging.level.org.springframework.amqp=DEBUG