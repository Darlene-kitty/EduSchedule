# Server Configuration
server.port=8080

# Application Name
spring.application.name=API-GATEWAY

# Config Server
spring.config.import=optional:configserver:http://localhost:8888

# Gateway Discovery Configuration
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Gateway Routes - User Service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/auth/**

# Gateway Routes - School Service
spring.cloud.gateway.routes[1].id=school-service
spring.cloud.gateway.routes[1].uri=lb://SCHOOL-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/schools/**,/api/v1/filieres/**,/api/v1/groupes/**

# Gateway Routes - Resource Service
spring.cloud.gateway.routes[2].id=resource-service
spring.cloud.gateway.routes[2].uri=lb://RESOURCE-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/salles/**,/api/v1/equipements/**

# Gateway Routes - Course Service
spring.cloud.gateway.routes[3].id=course-service
spring.cloud.gateway.routes[3].uri=lb://course-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/cours/**

# Gateway Routes - Scheduling Service
spring.cloud.gateway.routes[4].id=scheduling-service
spring.cloud.gateway.routes[4].uri=lb://scheduling-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/emplois/**

# Gateway Routes - Reservation Service
spring.cloud.gateway.routes[5].id=reservation-service
spring.cloud.gateway.routes[5].uri=lb://reservation-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/reservations/**

# Gateway Routes - Notification Service
spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://notification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/notifications/**

# Gateway Routes - Reporting Service
spring.cloud.gateway.routes[7].id=reporting-service
spring.cloud.gateway.routes[7].uri=lb://reporting-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/reports/**

# Gateway Routes - ENT Integration Service
spring.cloud.gateway.routes[8].id=ent-integration-service
spring.cloud.gateway.routes[8].uri=lb://ent-integration-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/ent/**

# Gateway Routes - Calendar Service
spring.cloud.gateway.routes[9].id=calendar-service
spring.cloud.gateway.routes[9].uri=lb://calendar-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/calendar/**

# Gateway Routes - Teacher Availability (via Teacher Availability Service)
spring.cloud.gateway.routes[10].id=teacher-availability
spring.cloud.gateway.routes[10].uri=lb://TEACHER-AVAILABILITY-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/teacher-availability/**

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# Management Endpoints
management.endpoints.web.exposure.include=health,info,gateway
