# Configuration API Gateway
server.port=8080
spring.application.name=api-gateway

# Configuration Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Configuration des routes
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/auth/**,/api/teacher-availability/**,/api/multi-school/**

spring.cloud.gateway.routes[1].id=notification-service
spring.cloud.gateway.routes[1].uri=lb://notification-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[2].id=resource-service
spring.cloud.gateway.routes[2].uri=lb://resource-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/resources/**

spring.cloud.gateway.routes[3].id=course-service
spring.cloud.gateway.routes[3].uri=lb://course-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/courses/**

spring.cloud.gateway.routes[4].id=reservation-service
spring.cloud.gateway.routes[4].uri=lb://reservation-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/reservations/**,/api/room-optimization/**

spring.cloud.gateway.routes[5].id=scheduling-service
spring.cloud.gateway.routes[5].uri=lb://scheduling-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/schedules/**

spring.cloud.gateway.routes[6].id=school-service
spring.cloud.gateway.routes[6].uri=lb://school-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/schools/**

spring.cloud.gateway.routes[7].id=ai-service
spring.cloud.gateway.routes[7].uri=lb://ai-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/predictive-analytics/**,/api/ai/**

spring.cloud.gateway.routes[8].id=calendar-service
spring.cloud.gateway.routes[8].uri=lb://calendar-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/calendar/**

spring.cloud.gateway.routes[9].id=room-service
spring.cloud.gateway.routes[9].uri=lb://room-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/rooms/**

spring.cloud.gateway.routes[10].id=teacher-availability-service
spring.cloud.gateway.routes[10].uri=lb://teacher-availability-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/teacher-availability/**

spring.cloud.gateway.routes[11].id=event-service
spring.cloud.gateway.routes[11].uri=lb://event-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/events/**

spring.cloud.gateway.routes[12].id=reporting-service
spring.cloud.gateway.routes[12].uri=lb://reporting-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/reports/**

spring.cloud.gateway.routes[13].id=maintenance-service
spring.cloud.gateway.routes[13].uri=lb://maintenance-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/maintenance/**

spring.cloud.gateway.routes[14].id=integration-service
spring.cloud.gateway.routes[14].uri=lb://integration-service
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/integrations/**

spring.cloud.gateway.routes[15].id=ent-integration-service
spring.cloud.gateway.routes[15].uri=lb://ent-integration-service
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/ent/**

# Configuration CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# Configuration de sécurité
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# Configuration des timeouts
spring.cloud.gateway.httpclient.connect-timeout=30000
spring.cloud.gateway.httpclient.response-timeout=60s

# Configuration des logs
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web.cors=DEBUG

# Configuration de la découverte de services
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Configuration des filtres globaux
spring.cloud.gateway.default-filters[1]=AddRequestHeader=X-Request-Source, API-Gateway
spring.cloud.gateway.default-filters[2]=AddResponseHeader=X-Response-Source, API-Gateway

# Configuration des métriques
management.endpoints.web.exposure.include=health,info,metrics,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true

# Configuration de la résilience
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=user-service-cb
spring.cloud.gateway.routes[1].filters[0]=CircuitBreaker=notification-service-cb
spring.cloud.gateway.routes[2].filters[0]=CircuitBreaker=resource-service-cb
spring.cloud.gateway.routes[3].filters[0]=CircuitBreaker=course-service-cb
spring.cloud.gateway.routes[4].filters[0]=CircuitBreaker=reservation-service-cb
spring.cloud.gateway.routes[5].filters[0]=CircuitBreaker=scheduling-service-cb
spring.cloud.gateway.routes[6].filters[0]=CircuitBreaker=school-service-cb
spring.cloud.gateway.routes[7].filters[0]=CircuitBreaker=ai-service-cb

# Configuration des retry
spring.cloud.gateway.routes[0].filters[1]=Retry=3
spring.cloud.gateway.routes[1].filters[1]=Retry=3
spring.cloud.gateway.routes[2].filters[1]=Retry=3
spring.cloud.gateway.routes[3].filters[1]=Retry=3
spring.cloud.gateway.routes[4].filters[1]=Retry=3
spring.cloud.gateway.routes[5].filters[1]=Retry=3
spring.cloud.gateway.routes[6].filters[1]=Retry=3
spring.cloud.gateway.routes[7].filters[1]=Retry=3

# Configuration des rate limiting
spring.cloud.gateway.routes[0].filters[2]=RequestRateLimiter=10,1,#{@userKeyResolver}
spring.cloud.gateway.routes[1].filters[2]=RequestRateLimiter=20,2,#{@userKeyResolver}
spring.cloud.gateway.routes[2].filters[2]=RequestRateLimiter=15,1,#{@userKeyResolver}
spring.cloud.gateway.routes[3].filters[2]=RequestRateLimiter=15,1,#{@userKeyResolver}
spring.cloud.gateway.routes[4].filters[2]=RequestRateLimiter=25,2,#{@userKeyResolver}
spring.cloud.gateway.routes[5].filters[2]=RequestRateLimiter=20,2,#{@userKeyResolver}
spring.cloud.gateway.routes[6].filters[2]=RequestRateLimiter=10,1,#{@userKeyResolver}
spring.cloud.gateway.routes[7].filters[2]=RequestRateLimiter=30,3,#{@userKeyResolver}

# Configuration Redis pour rate limiting
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms

# Configuration de la base de données (si nécessaire)
spring.datasource.url=jdbc:mysql://localhost:3306/eduschedule_gateway?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuration des profils
spring.profiles.active=development

# Configuration de la sécurité JWT
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# Configuration des variables d'environnement
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000
app.frontend.url=http://localhost:3000

# Configuration des services externes
external.services.google-calendar.enabled=true
external.services.outlook.enabled=true
external.services.moodle.enabled=false
external.services.teams.enabled=true

# Configuration des notifications
notification.email.enabled=true
notification.sms.enabled=true
notification.push.enabled=true

# Configuration des analytics
analytics.enabled=true
analytics.retention-days=90

# Configuration du cache
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Configuration des métriques avancées
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.9,0.95,0.99

# Configuration de la documentation API
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Configuration de la compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Configuration des headers de sécurité
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax