    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduschedule-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - eduschedule-network

networks:
  eduschedule-network:
    driver: bridge

volumes:
  mysql-data:

