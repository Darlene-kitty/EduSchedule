server:
  port: 8089

spring:
  application:
    name: teacher-availability-service
  
  # Database Configuration
  datasource:
    url: jdbc:h2:mem:teacher_availability_db
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  
  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    cm.iusjc.teacheravailabilityservice: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

# Custom properties
teacher-availability:
  cache:
    ttl: 3600 # 1 hour in seconds
  conflict-detection:
    enabled: true
    buffer-minutes: 15 # Buffer time between slots
  notifications:
    enabled: true
    queue-name: availability.notifications