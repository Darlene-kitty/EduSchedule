# Server Configuration
server.port=8084

# Application Name
spring.application.name=COURSE-SERVICE

# Database Configuration
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/iusjcdb}
spring.datasource.username=${MYSQL_USER:iusjc}
spring.datasource.password=${MYSQL_PASSWORD:iusjc2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics

# External Services
app.user-service.url=${USER_SERVICE_URL:http://localhost:8081}

# Logging
logging.level.cm.iusjc.course=INFO
logging.level.org.springframework.web=DEBUG
