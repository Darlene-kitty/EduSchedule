<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registration</title>
</head>
<body>
    <h1>Test d'enregistrement</h1>
    <form id="registerForm">
        <div>
            <label>Nom d'utilisateur:</label>
            <input type="text" id="username" value="testfrontend" required>
        </div>
        <div>
            <label>Email:</label>
            <input type="email" id="email" value="testfrontend@example.com" required>
        </div>
        <div>
            <label>Mot de passe:</label>
            <input type="password" id="password" value="password123" required>
        </div>
        <div>
            <label>Rôle:</label>
            <select id="role" required>
                <option value="STUDENT">Étudiant</option>
                <option value="TEACHER">Enseignant</option>
                <option value="ADMIN">Administrateur</option>
            </select>
        </div>
        <button type="submit">S'inscrire</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Inscription en cours...';
            
            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };
            
            console.log('Sending registration data:', formData);
            
            try {
                const response = await fetch('http://localhost:8080/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', Object.fromEntries(response.headers.entries()));
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Success:', data);
                    resultDiv.innerHTML = `<div style="color: green;">Inscription réussie ! ID: ${data.id}</div>`;
                } else {
                    const error = await response.text();
                    console.error('Error:', error);
                    resultDiv.innerHTML = `<div style="color: red;">Erreur: ${error}</div>`;
                }
            } catch (error) {
                console.error('Network error:', error);
                resultDiv.innerHTML = `<div style="color: red;">Erreur réseau: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
