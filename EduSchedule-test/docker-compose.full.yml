services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================
  
  mysql:
    image: mysql:8.0
    container_name: eduschedule-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: iusjcdb
      MYSQL_USER: iusjc
      MYSQL_PASSWORD: iusjc2025
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uiusjc", "-piusjc2025"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduschedule-network

  redis:
    image: redis:7-alpine
    container_name: eduschedule-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduschedule-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: eduschedule-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: iusjc
      RABBITMQ_DEFAULT_PASS: iusjc2025
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduschedule-network

  eureka-server:
    image: steeltoeoss/eureka-server:latest
    container_name: eduschedule-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - eduschedule-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: eduschedule-zipkin
    ports:
      - "9411:9411"
    networks:
      - eduschedule-network

  # ============================================
  # MICROSERVICES SPRING BOOT
  # ============================================

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: eduschedule-config-server
    ports:
      - "8888:8888"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - eduschedule-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: eduschedule-api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      - eduschedule-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: eduschedule-user-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/iusjcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=iusjc
      - SPRING_DATASOURCE_PASSWORD=iusjc2025
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - eduschedule-network

  resource-service:
    build:
      context: ./resource-service
      dockerfile: Dockerfile
    container_name: eduschedule-resource-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/iusjcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=iusjc
      - SPRING_DATASOURCE_PASSWORD=iusjc2025
      - REDIS_HOST=redis
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - eduschedule-network

  scheduling-service:
    build:
      context: ./scheduling-service
      dockerfile: Dockerfile
    container_name: eduschedule-scheduling-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/iusjcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=iusjc
      - SPRING_DATASOURCE_PASSWORD=iusjc2025
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
      - RABBITMQ_DEFAULT_USER=iusjc
      - RABBITMQ_DEFAULT_PASS=iusjc2025
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - eduschedule-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: eduschedule-notification-service
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - RABBITMQ_DEFAULT_USER=iusjc
      - RABBITMQ_DEFAULT_PASS=iusjc2025
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - eduschedule-network

  # ============================================
  # FRONTEND
  # ============================================

  frontend:
    image: nginx:alpine
    container_name: eduschedule-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - eduschedule-network

networks:
  eduschedule-network:
    driver: bridge

volumes:
  mysql-data:
