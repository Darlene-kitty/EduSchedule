# Server Configuration
server.port=8091

# Application Name
spring.application.name=REPORTING-SERVICE

# MySQL DataSource Configuration (BASE UNIQUE)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/iusjcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:iusjc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:iusjc2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics

# Service URLs for data collection
app.user-service.url=${USER_SERVICE_URL:http://localhost:8081}
app.course-service.url=${COURSE_SERVICE_URL:http://localhost:8084}
app.reservation-service.url=${RESERVATION_SERVICE_URL:http://localhost:8086}
app.scheduling-service.url=${SCHEDULING_SERVICE_URL:http://localhost:8085}
app.resource-service.url=${RESOURCE_SERVICE_URL:http://localhost:8082}

# Report Configuration
app.reports.output-directory=${REPORTS_OUTPUT_DIR:./reports}
app.reports.max-file-age-days=${REPORTS_MAX_FILE_AGE:30}
