# Configuration de développement avec H2

# H2 Database Configuration (pour développement)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (pour debug)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration pour H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Initialisation des données
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-dev.sql
spring.sql.init.data-locations=classpath:data-dev.sql