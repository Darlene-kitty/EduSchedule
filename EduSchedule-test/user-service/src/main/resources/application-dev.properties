# Configuration dev - MySQL local (même driver que tous les autres services)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/iusjcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:iusjc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:iusjc2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

spring.sql.init.mode=never
