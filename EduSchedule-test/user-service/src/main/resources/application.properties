# Server Configuration
server.port=8081

# Application Name
spring.application.name=USER-SERVICE

# Config Server
spring.config.import=optional:configserver:http://localhost:8888

# MySQL DataSource Configuration (BASE UNIQUE)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/iusjcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:iusjc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:iusjc2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Security
spring.security.user.name=admin
spring.security.user.password=admin123

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.initial-instance-info-replication-interval-seconds=40
eureka.client.registry-fetch-interval-seconds=30
eureka.client.instance-info-replication-interval-seconds=30
eureka.client.eureka-service-url-poll-interval-seconds=300
eureka.client.eureka-server-read-timeout-seconds=10
eureka.client.eureka-server-connect-timeout-seconds=10

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics

# JWT Configuration
jwt.secret=${JWT_SECRET:iusjc-secret-key-2024-eduschedule-system}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.remember-me-expiration=${JWT_REMEMBER_ME_EXPIRATION:2592000000}

# Refresh Token Configuration
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.refresh.remember-me-expiration=${JWT_REFRESH_REMEMBER_ME_EXPIRATION:2592000000}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

# Application Configuration
app.name=EduSchedule
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8082}
app.password-reset.token-expiry-hours=${PASSWORD_RESET_TOKEN_EXPIRY_HOURS:24}
