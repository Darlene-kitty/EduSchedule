# Server Configuration
server.port=8081

# Application Name
spring.application.name=USER-SERVICE

# Config Server
spring.config.import=optional:configserver:http://localhost:8888

# MariaDB DataSource Configuration
# Hardcoded to mariadb — env var SPRING_DATASOURCE_URL (if set from old .env) is intentionally ignored
spring.datasource.url=jdbc:mariadb://localhost:3306/iusjcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=iusjc
spring.datasource.password=iusjc2025
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# Disable SQL script init (handled by DataInitializer)
spring.sql.init.mode=never

# Security - remove default user to avoid conflict with custom UserDetailsService
# spring.security.user.name and password intentionally omitted

# Temporary: enable security debug to verify filter chain on startup
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
logging.level.cm.iusjc.userservice=DEBUG

# Exclude reactive security auto-config (reactor-core is on classpath via spring-cloud-loadbalancer
# but user-service is a servlet app, not reactive)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.initial-instance-info-replication-interval-seconds=40
eureka.client.registry-fetch-interval-seconds=30
eureka.client.instance-info-replication-interval-seconds=30
eureka.client.eureka-service-url-poll-interval-seconds=300
eureka.client.eureka-server-read-timeout-seconds=10
eureka.client.eureka-server-connect-timeout-seconds=10

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.mail.enabled=false
management.health.redis.enabled=false
management.health.rabbit.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:iusjc-secret-key-2024-eduschedule-system}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.remember-me-expiration=${JWT_REMEMBER_ME_EXPIRATION:2592000000}

# Refresh Token Configuration
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.refresh.remember-me-expiration=${JWT_REFRESH_REMEMBER_ME_EXPIRATION:2592000000}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

# Redis Configuration
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.timeout=500ms
spring.data.redis.connect-timeout=500ms

# RabbitMQ Configuration
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:iusjc}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:iusjc2025}

# Application Configuration
app.name=EduSchedule
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8082}
app.password-reset.token-expiry-hours=${PASSWORD_RESET_TOKEN_EXPIRY_HOURS:24}
