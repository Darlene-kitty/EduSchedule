# ============================================================
# Nginx — Reverse Proxy EduSchedule
# Copier dans /etc/nginx/sites-available/eduschedule
# puis: sudo ln -s /etc/nginx/sites-available/eduschedule /etc/nginx/sites-enabled/
# puis: sudo nginx -t && sudo systemctl reload nginx
# ============================================================
# Remplacer tondomaine.com par ton vrai domaine

server {
    listen 80;
    server_name tondomaine.com www.tondomaine.com;

    # Redirection HTTPS (après certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tondomaine.com www.tondomaine.com;

    # Certificats SSL (générés par certbot)
    ssl_certificate     /etc/letsencrypt/live/tondomaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tondomaine.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Frontend Angular ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://localhost:4200;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── API Gateway ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket (notifications temps réel) ─────────────────────────────
    location /ws/ {
        proxy_pass         http://localhost:8087/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # ── Eureka Dashboard (admin seulement) ───────────────────────────────
    location /eureka/ {
        proxy_pass http://localhost:8761/;
        proxy_set_header Host $host;
        # Restreindre l'accès en production
        # allow 1.2.3.4;  # ton IP
        # deny all;
    }
}
