  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend-angular:
    image: ${DOCKER_IMAGE_PREFIX}-frontend-angular:latest
    platform: linux/amd64
    container_name: eduschedule-frontend-angular
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 192m
    ports:
      - "80:4200"
    depends_on:
      - api-gateway
    networks:
      - eduschedule-network

networks:
  eduschedule-network:
    driver: bridge

volumes:
  mysql-data:
