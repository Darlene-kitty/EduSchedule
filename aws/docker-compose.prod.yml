        condition: service_healthy
      eureka-server:
        condition: service_healthy

  teacher-availability-service:
    image: ${DOCKER_IMAGE_PREFIX}-teacher-availability-service:latest
    <<: *java-defaults
    container_name: eduschedule-teacher-availability-service
    environment:
      <<: *java-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
