# Server Configuration
server.port=8084

# Application Name
spring.application.name=COURSE-SERVICE

# Database Configuration
# Uses SPRING_DATASOURCE_URL (shared) or COURSE_DATASOURCE_URL (dedicated) — both jdbc:mysql://
spring.datasource.url=${COURSE_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/iusjcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:iusjc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:iusjc2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=120000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics

# External Services
app.user-service.url=${USER_SERVICE_URL:http://localhost:8096}
app.calendar-service.url=${CALENDAR_SERVICE_URL:http://localhost:8090}

# Logging
logging.level.cm.iusjc.course=INFO
logging.level.org.springframework.web=DEBUG

# Afficher les détails des erreurs de validation
server.error.include-binding-errors=always
server.error.include-message=always

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false


# RabbitMQ Configuration
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}

# ── Supports de cours (upload fichiers) ──────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
app.documents.upload-dir=${DOCUMENTS_UPLOAD_DIR:./uploads/course-documents}
app.documents.base-url=${DOCUMENTS_BASE_URL:http://localhost:8084/api/v1/courses}
