# Server Configuration
server.port=0

# Application Name
spring.application.name=NOTIFICATION-SERVICE

# RabbitMQ Configuration
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:iusjc}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:iusjc2025}

# Queue Configuration
notification.queue.name=notification-queue
notification.exchange.name=notification-exchange
notification.routing.key=notification.#

# Mail Configuration (à configurer selon votre serveur SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Management Endpoints
management.endpoints.web.exposure.include=health,info
