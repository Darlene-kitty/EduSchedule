name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/eduschedule

jobs:
  build-java:
    name: Build and Test Java Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean package -DskipTests --batch-mode

      - name: Run tests
        run: mvn test --batch-mode

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-angular/package-lock.json

      - name: Install dependencies
        working-directory: frontend-angular
        run: npm ci

      - name: Build Angular production
        working-directory: frontend-angular
        run: npm run build -- --configuration production

  docker-build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [ build-java, build-frontend ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs
        run: mvn clean package -DskipTests --batch-mode

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Push eureka-server
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-eureka-server:latest,${{ env.DOCKER_IMAGE_PREFIX }}-eureka-server:${{ steps.tag.outputs.TAG }}

      - name: Push config-server
        uses: docker/build-push-action@v5
        with:
          context: ./config-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-config-server:latest,${{ env.DOCKER_IMAGE_PREFIX }}-config-server:${{ steps.tag.outputs.TAG }}

      - name: Push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-api-gateway:latest,${{ env.DOCKER_IMAGE_PREFIX }}-api-gateway:${{ steps.tag.outputs.TAG }}

      - name: Push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-user-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-user-service:${{ steps.tag.outputs.TAG }}

      - name: Push resource-service
        uses: docker/build-push-action@v5
        with:
          context: ./resource-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-resource-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-resource-service:${{ steps.tag.outputs.TAG }}

      - name: Push reservation-service
        uses: docker/build-push-action@v5
        with:
          context: ./reservation-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-reservation-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-reservation-service:${{ steps.tag.outputs.TAG }}

      - name: Push course-service
        uses: docker/build-push-action@v5
        with:
          context: ./course-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-course-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-course-service:${{ steps.tag.outputs.TAG }}

      - name: Push school-service
        uses: docker/build-push-action@v5
        with:
          context: ./school-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-school-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-school-service:${{ steps.tag.outputs.TAG }}

      - name: Push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-notification-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-notification-service:${{ steps.tag.outputs.TAG }}

      - name: Push scheduling-service
        uses: docker/build-push-action@v5
        with:
          context: ./scheduling-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-scheduling-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-scheduling-service:${{ steps.tag.outputs.TAG }}

      - name: Push room-service
        uses: docker/build-push-action@v5
        with:
          context: ./room-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-room-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-room-service:${{ steps.tag.outputs.TAG }}

      - name: Push calendar-service
        uses: docker/build-push-action@v5
        with:
          context: ./calendar-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-calendar-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-calendar-service:${{ steps.tag.outputs.TAG }}

      - name: Push reporting-service
        uses: docker/build-push-action@v5
        with:
          context: ./reporting-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-reporting-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-reporting-service:${{ steps.tag.outputs.TAG }}

      - name: Push event-service
        uses: docker/build-push-action@v5
        with:
          context: ./event-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-event-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-event-service:${{ steps.tag.outputs.TAG }}

      - name: Push teacher-availability-service
        uses: docker/build-push-action@v5
        with:
          context: ./teacher-availability-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-teacher-availability-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-teacher-availability-service:${{ steps.tag.outputs.TAG }}

      - name: Push ai-service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-ai-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-ai-service:${{ steps.tag.outputs.TAG }}

      - name: Push maintenance-service
        uses: docker/build-push-action@v5
        with:
          context: ./maintenance-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-maintenance-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-maintenance-service:${{ steps.tag.outputs.TAG }}

      - name: Push ent-integration-service
        uses: docker/build-push-action@v5
        with:
          context: ./ent-integration-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-ent-integration-service:latest,${{ env.DOCKER_IMAGE_PREFIX }}-ent-integration-service:${{ steps.tag.outputs.TAG }}

      - name: Push frontend-angular
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-angular
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE_PREFIX }}-frontend-angular:latest,${{ env.DOCKER_IMAGE_PREFIX }}-frontend-angular:${{ steps.tag.outputs.TAG }}

  # ── JOB 4 : Deploy to AWS EC2 ─────────────────────────────────────────
  deploy-aws:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            set -e
            # Create app directory and clone if first deploy
            if [ ! -d /opt/eduschedule ]; then
              sudo mkdir -p /opt/eduschedule
              sudo chown ubuntu:ubuntu /opt/eduschedule
              git clone https://github.com/${{ github.repository }}.git /opt/eduschedule
            fi
            cd /opt/eduschedule
            git pull origin main

            # Ensure ubuntu user is in docker group
            if ! groups ubuntu | grep -q docker; then
              sudo usermod -aG docker ubuntu
            fi

            # Install Docker Compose plugin v2 if not available
            if ! sudo docker compose version &>/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            # Verify .env exists
            if [ ! -f /opt/eduschedule/.env ]; then
              echo "ERROR: /opt/eduschedule/.env not found. Please create it manually."
              exit 1
            fi

            sudo DOCKER_HOST=unix:///var/run/docker.sock docker compose --env-file /opt/eduschedule/.env -f aws/docker-compose.prod.yml pull
            sudo DOCKER_HOST=unix:///var/run/docker.sock docker compose --env-file /opt/eduschedule/.env -f aws/docker-compose.prod.yml up -d --remove-orphans
            sudo DOCKER_HOST=unix:///var/run/docker.sock docker image prune -f
            echo "Deployed at $(date)"
