<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IUSJC Planning 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-4xl font-bold text-blue-600 mb-4">
                IUSJC Planning 2025
            </h1>
            <p class="text-gray-700 text-lg mb-6">
                Système de gestion d'emplois du temps - Projet Transversal ISI 2025-2026
            </p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-blue-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-blue-800 mb-2">Microservices</h3>
                    <p class="text-sm text-gray-600">Architecture distribuée avec Spring Cloud</p>
                </div>
                <div class="bg-green-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-green-800 mb-2">MySQL</h3>
                    <p class="text-sm text-gray-600">Base de données relationnelle</p>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-purple-800 mb-2">Thymeleaf + Tailwind</h3>
                    <p class="text-sm text-gray-600">Interface web moderne</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
