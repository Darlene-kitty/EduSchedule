# Server Configuration
server.port=0

# Application Name
spring.application.name=USER-SERVICE

# MySQL DataSource Configuration (BASE UNIQUE)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/iusjcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:iusjc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:iusjc2024}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Security
spring.security.user.name=admin
spring.security.user.password=admin123

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics

# JWT Configuration
jwt.secret=iusjc-secret-key-2024-eduschedule-system
jwt.expiration=86400000
