# Configuration API Gateway
server.port=8080
spring.application.name=api-gateway

# Configuration Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Configuration Config Server
spring.config.import=optional:configserver:http://localhost:8888

# Configuration des routes
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/auth/**,/api/multi-school/**,/api/students/**,/api/teacher-availability/**,/api/profile/**

spring.cloud.gateway.routes[1].id=notification-service
spring.cloud.gateway.routes[1].uri=lb://notification-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/notifications/**,/api/notifications/**,/ws/**

spring.cloud.gateway.routes[2].id=resource-service
spring.cloud.gateway.routes[2].uri=lb://resource-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/salles/**,/api/resources/**,/api/v1/equipment/**,/api/v1/equipment-types/**,/api/v1/equipment-usage/**,/api/v1/salle-materiels/**

spring.cloud.gateway.routes[3].id=course-service
spring.cloud.gateway.routes[3].uri=lb://course-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/courses/**,/api/v1/timetable/**,/api/v1/exams/**
spring.cloud.gateway.routes[3].metadata.response-timeout=120000
spring.cloud.gateway.routes[3].metadata.connect-timeout=30000

spring.cloud.gateway.routes[4].id=reservation-service
spring.cloud.gateway.routes[4].uri=lb://reservation-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/reservations/**,/api/room-optimization/**

spring.cloud.gateway.routes[5].id=scheduling-service
spring.cloud.gateway.routes[5].uri=lb://scheduling-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/schedules/**,/api/v1/timeslots/**

spring.cloud.gateway.routes[6].id=school-service
spring.cloud.gateway.routes[6].uri=lb://school-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/schools/**,/api/v1/filieres/**,/api/v1/niveaux/**,/api/v1/groupes/**,/api/v1/categories-ue/**,/api/v1/config/**

spring.cloud.gateway.routes[7].id=ai-service
spring.cloud.gateway.routes[7].uri=lb://ai-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/analytics/**

spring.cloud.gateway.routes[8].id=calendar-service
spring.cloud.gateway.routes[8].uri=lb://calendar-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/calendar/**

spring.cloud.gateway.routes[9].id=room-service
spring.cloud.gateway.routes[9].uri=lb://room-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/rooms/**

spring.cloud.gateway.routes[10].id=event-service
spring.cloud.gateway.routes[10].uri=lb://event-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/v1/events/**

spring.cloud.gateway.routes[11].id=reporting-service
spring.cloud.gateway.routes[11].uri=lb://reporting-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/v1/reports/**

spring.cloud.gateway.routes[12].id=maintenance-service
spring.cloud.gateway.routes[12].uri=lb://maintenance-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/maintenance/**

spring.cloud.gateway.routes[13].id=integration-service
spring.cloud.gateway.routes[13].uri=lb://integration-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/integrations/**

spring.cloud.gateway.routes[14].id=ent-integration-service
spring.cloud.gateway.routes[14].uri=lb://ent-integration-service
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/ent/**

# CORS is handled by SecurityConfig bean (CorsConfigurationSource)
# DedupeResponseHeader prevents duplicate CORS headers from gateway + downstream services
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST RETAIN_UNIQUE

# Configuration des timeouts
spring.cloud.gateway.httpclient.connect-timeout=30000
spring.cloud.gateway.httpclient.response-timeout=120s

# Configuration des logs
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web.cors=DEBUG

# Configuration de la découverte de services
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Configuration des filtres globaux
spring.cloud.gateway.default-filters[1]=AddRequestHeader=X-Request-Source, API-Gateway
spring.cloud.gateway.default-filters[2]=AddResponseHeader=X-Response-Source, API-Gateway

# Configuration des métriques
management.endpoints.web.exposure.include=health,info,metrics,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true

# Resilience filters are defined inline per route above

# Gateway doesn't use DB - exclude auto-configs to avoid startup failures
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Configuration des profils
spring.profiles.active=development

# Configuration de la sécurité JWT
jwt.secret=${JWT_SECRET:iusjc-secret-key-2024-eduschedule-system}
jwt.expiration=86400000

# Configuration des variables d'environnement
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200,http://frontend:3000,http://frontend:3001,http://frontend-angular:4200,http://127.0.0.1:3000,http://127.0.0.1:4200
app.frontend.url=http://frontend:3000

# Configuration des services externes
external.services.google-calendar.enabled=true
external.services.outlook.enabled=true
external.services.moodle.enabled=false
external.services.teams.enabled=true

# Configuration des notifications
notification.email.enabled=true
notification.sms.enabled=true
notification.push.enabled=true

# Configuration des analytics
analytics.enabled=true
analytics.retention-days=90

# Configuration du cache
spring.cache.type=simple
# spring.cache.type=redis  # Enable when Redis is available
# spring.cache.redis.time-to-live=600000

# Redis not used in gateway (no rate limiting configured)
# spring.data.redis.host=localhost

# Configuration des métriques avancées
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.9,0.95,0.99

# Configuration de la documentation API
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Configuration de la compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Configuration des headers de sécurité
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
