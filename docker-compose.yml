services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eduschedule
    ports: ["3306:3306"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["5672:5672", "15672:15672"]

  # LES SEULES IMAGES QUI MARCHENT À 100% EN NOVEMBRE 2025
  eureka-server:
    image: steeltoeoss/eureka-server:latest
    ports: ["8761:8761"]

  zipkin:
    image: openzipkin/zipkin:latest
    ports: ["9411:9411"]

  # Frontend statique ultra-léger avec login + dashboard déjà fait (je te donne le code après)
  frontend:
    image: nginx:alpine
    ports: ["3000:80"]
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

