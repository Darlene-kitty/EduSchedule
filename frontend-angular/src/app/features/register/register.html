<div class="min-h-screen bg-gradient-to-br from-green-50 via-white to-blue-50 relative overflow-hidden">
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-gradient-to-br from-green-200/30 to-blue-200/30 rounded-full animate-blob"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-gradient-to-br from-yellow-200/30 to-green-200/30 rounded-full animate-blob animation-delay-2000"></div>
  </div>

  <div class="relative z-10 min-h-screen flex">
    <!-- Left side - Branding -->
    <div class="hidden lg:flex lg:w-1/2 flex-col justify-center px-12 xl:px-16">
      <div class="animate-fade-in-down">
        <div class="flex items-center mb-8">
          <div class="flex items-center justify-center w-16 h-16 bg-gradient-to-br from-[#15803D] to-[#22C55E] rounded-2xl shadow-lg mr-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
              <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
              <line x1="16" x2="16" y1="2" y2="6"/>
              <line x1="8" x2="8" y1="2" y2="6"/>
              <line x1="3" x2="21" y1="10" y2="10"/>
            </svg>
          </div>
          <div>
            <h1 class="text-3xl font-bold text-gray-900">EduSchedule</h1>
            <p class="text-lg text-gray-600">IUSJC</p>
          </div>
        </div>
        <h2 class="text-4xl xl:text-5xl font-bold text-gray-900 mb-6 leading-tight">
          Rejoignez notre
          <span class="text-[#15803D] block">communauté éducative</span>
        </h2>
        <p class="text-xl text-gray-600 mb-12 leading-relaxed">
          Créez votre compte pour accéder à tous les outils de gestion académique.
        </p>
      </div>
    </div>

    <!-- Right side - Registration form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-4 lg:p-8">
      <div class="w-full max-w-md animate-fade-in-up">
        <!-- Mobile header -->
        <div class="lg:hidden text-center mb-8">
          <h1 class="text-2xl font-bold text-gray-900 mb-2">EduSchedule - IUSJC</h1>
        </div>

        <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl border border-white/20 p-8 lg:p-10">
          <div class="mb-8">
            <h2 class="text-2xl lg:text-3xl font-bold text-gray-900 mb-2">Inscription</h2>
            <p class="text-gray-600">Créez votre compte pour commencer</p>
          </div>

          <!-- Error message -->
          <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
            {{ errorMessage }}
          </div>

          <form (ngSubmit)="onSubmit()" class="space-y-4">
            <!-- Nom d'utilisateur -->
            <div class="space-y-1">
              <label for="username" class="text-gray-900 font-medium text-sm">Nom d'utilisateur *</label>
              <input
                id="username"
                type="text"
                placeholder="ex: jean_dupont"
                [(ngModel)]="formData.username"
                name="username"
                class="w-full h-12 px-4 bg-gray-50/50 border border-gray-200 rounded-lg focus:bg-white focus:border-[#15803D] focus:ring-2 focus:ring-[#15803D]/20 transition-all duration-200"
                required
                [disabled]="loading"
              />
              <p class="text-xs text-gray-400">Lettres, chiffres, _ et - uniquement</p>
            </div>

            <!-- Prénom / Nom -->
            <div class="grid grid-cols-2 gap-3">
              <div class="space-y-1">
                <label for="firstName" class="text-gray-900 font-medium text-sm">Prénom</label>
                <input
                  id="firstName"
                  type="text"
                  placeholder="Jean"
                  [(ngModel)]="formData.firstName"
                  name="firstName"
                  class="w-full h-12 px-4 bg-gray-50/50 border border-gray-200 rounded-lg focus:bg-white focus:border-[#15803D] focus:ring-2 focus:ring-[#15803D]/20 transition-all duration-200"
                  [disabled]="loading"
                />
              </div>
              <div class="space-y-1">
                <label for="lastName" class="text-gray-900 font-medium text-sm">Nom</label>
                <input
                  id="lastName"
                  type="text"
                  placeholder="Dupont"
                  [(ngModel)]="formData.lastName"
                  name="lastName"
                  class="w-full h-12 px-4 bg-gray-50/50 border border-gray-200 rounded-lg focus:bg-white focus:border-[#15803D] focus:ring-2 focus:ring-[#15803D]/20 transition-all duration-200"
                  [disabled]="loading"
                />
              </div>
            </div>

            <!-- Email -->
            <div class="space-y-1">
              <label for="email" class="text-gray-900 font-medium text-sm">Adresse email *</label>
              <input
                id="email"
                type="email"
                placeholder="nom@exemple.com"
                [(ngModel)]="formData.email"
                name="email"
                class="w-full h-12 px-4 bg-gray-50/50 border border-gray-200 rounded-lg focus:bg-white focus:border-[#15803D] focus:ring-2 focus:ring-[#15803D]/20 transition-all duration-200"
                required
                [disabled]="loading"
              />
            </div>

            <!-- Rôle -->
            <div class="space-y-1">
              <label for="role" class="text-gray-900 font-medium text-sm">Rôle *</label>
              <select
                id="role"
                [(ngModel)]="formData.role"
                name="role"
                class="w-full h-12 px-4 bg-gray-50/50 border border-gray-200 rounded-lg focus:bg-white focus:border-[#15803D] focus:ring-2 focus:ring-[#15803D]/20 transition-all duration-200"
                required
                [disabled]="loading"
              >
                <option value="">Sélectionnez votre rôle</option>
                <option value="ADMIN">Administrateur</option>
                <option value="TEACHER">Enseignant</option>
                <option value="STUDENT">Étudiant</option>
              </select>
            </div>

            <!-- Mot de passe -->
            <div class="space-y-1">
              <label for="password" class="text-gray-900 font-medium text-sm">Mot de passe *</label>
              <div class="relative">
                <input
                  id="password"
                  [type]="showPassword ? 'text' : 'password'"
                  placeholder="Minimum 6 caractères"
                  [(ngModel)]="formData.password"
                  name="password"
                  class="w-full h-12 px-4 pr-12 bg-gray-50/50 border border-gray-200 rounded-lg focus:bg-white focus:border-[#15803D] focus:ring-2 focus:ring-[#15803D]/20 transition-all duration-200"
                  required
                  [disabled]="loading"
                />
                <button type="button" (click)="togglePassword()" class="absolute right-3 top-3 text-gray-500 hover:text-[#15803D]">
                  <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                  <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                    <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Confirmer mot de passe -->
            <div class="space-y-1">
              <label for="confirmPassword" class="text-gray-900 font-medium text-sm">Confirmer le mot de passe *</label>
              <div class="relative">
                <input
                  id="confirmPassword"
                  [type]="showConfirmPassword ? 'text' : 'password'"
                  placeholder="Répétez votre mot de passe"
                  [(ngModel)]="formData.confirmPassword"
                  name="confirmPassword"
                  class="w-full h-12 px-4 pr-12 bg-gray-50/50 border border-gray-200 rounded-lg focus:bg-white focus:border-[#15803D] focus:ring-2 focus:ring-[#15803D]/20 transition-all duration-200"
                  required
                  [disabled]="loading"
                />
                <button type="button" (click)="toggleConfirmPassword()" class="absolute right-3 top-3 text-gray-500 hover:text-[#15803D]">
                  <svg *ngIf="!showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                  <svg *ngIf="showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                    <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Submit -->
            <button
              type="submit"
              class="w-full h-12 bg-gradient-to-r from-[#15803D] to-[#22C55E] hover:from-[#166534] hover:to-[#16A34A] text-white font-medium rounded-lg shadow-lg hover:shadow-xl transition-all duration-200 flex items-center justify-center mt-2"
              [disabled]="loading"
            >
              <span *ngIf="!loading">Créer mon compte</span>
              <span *ngIf="loading" class="flex items-center">
                <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2"></div>
                Inscription en cours...
              </span>
            </button>
          </form>

          <div class="mt-6 pt-6 border-t border-gray-200">
            <p class="text-center text-gray-600">
              Déjà un compte ?
              <a routerLink="/login" class="text-[#15803D] hover:text-[#166534] font-medium ml-1">Se connecter</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
