
<!-- Chargement du token -->
<div class="min-h-screen flex items-center justify-center bg-gray-50" *ngIf="tokenValid === null">
  <div class="card w-full max-w-md">
    <div class="card-content pt-6">
      <div class="text-center">Validation du token en cours...</div>
    </div>
  </div>
</div>

<!-- Token invalide -->
<div class="min-h-screen flex items-center justify-center bg-gray-50" *ngIf="tokenValid === false">
  <div class="card w-full max-w-md">
    <div class="card-header">
      <h2 class="card-title flex items-center gap-2">
        <span class="icon-circle error">
          <!-- XCircle Lucide SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
        </span>
        Token invalide
      </h2>
    </div>
    <div class="card-content">
      <div class="alert alert-error">
        <p>{{ message }}</p>
      </div>
      <button class="btn btn-primary w-full mt-4" (click)="goToLogin()">
        Retour à la connexion
      </button>
    </div>
  </div>
</div>

<!-- Succès -->
<div class="min-h-screen flex items-center justify-center bg-gray-50" *ngIf="isSuccess">
  <div class="card w-full max-w-md">
    <div class="card-header">
      <h2 class="card-title flex items-center gap-2">
        <span class="icon-circle success">
          <!-- CheckCircle Lucide SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </span>
        Succès !
      </h2>
    </div>
    <div class="card-content">
      <div class="alert alert-success">
        <p>{{ message }}</p>
      </div>
      <p class="redirect-hint">Redirection vers la page de connexion dans quelques secondes...</p>
    </div>
  </div>
</div>

<!-- Formulaire principal -->
<div class="min-h-screen flex items-center justify-center bg-gray-50" *ngIf="tokenValid === true && !isSuccess">
  <div class="card w-full max-w-md">
    <div class="card-header">
      <h2 class="card-title">Réinitialiser le mot de passe</h2>
      <p class="card-description">Définissez votre nouveau mot de passe</p>
    </div>
    <div class="card-content">
      <form (ngSubmit)="handleSubmit()" #resetForm="ngForm" class="space-y-4">
        <div class="space-y-2">
          <label for="newPassword" class="form-label">Nouveau mot de passe</label>
          <div class="input-wrapper relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="newPassword"
              name="newPassword"
              class="form-input"
              [(ngModel)]="formData.newPassword"
              placeholder="Minimum 6 caractères"
              required
            />
            <button type="button" class="toggle-password absolute right-0 top-0 h-full px-3 py-2 hover:bg-transparent" (click)="showPassword = !showPassword">
              <ng-container *ngIf="!showPassword">
                <!-- Eye Lucide SVG -->
                <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </ng-container>
              <ng-container *ngIf="showPassword">
                <!-- EyeOff Lucide SVG -->
                <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </ng-container>
            </button>
          </div>
        </div>
        <div class="space-y-2">
          <label for="confirmPassword" class="form-label">Confirmer le mot de passe</label>
          <div class="input-wrapper relative">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              id="confirmPassword"
              name="confirmPassword"
              class="form-input"
              [(ngModel)]="formData.confirmPassword"
              placeholder="Confirmez votre mot de passe"
              required
            />
            <button type="button" class="toggle-password absolute right-0 top-0 h-full px-3 py-2 hover:bg-transparent" (click)="showConfirmPassword = !showConfirmPassword">
              <ng-container *ngIf="!showConfirmPassword">
                <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </ng-container>
              <ng-container *ngIf="showConfirmPassword">
                <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </ng-container>
            </button>
          </div>
        </div>
        <div *ngIf="message && !isSuccess" class="alert alert-error">
          <p>{{ message }}</p>
        </div>
        <button type="submit" class="btn btn-primary w-full" [disabled]="isLoading">
          <span *ngIf="!isLoading">Réinitialiser le mot de passe</span>
          <span *ngIf="isLoading" class="btn-loading">
            <span class="spinner-sm"></span>
            Réinitialisation...
          </span>
        </button>
      </form>
      <div class="mt-4 text-center">
        <button class="btn-link" (click)="goToLogin()">
          Retour à la connexion
        </button>
      </div>
    </div>
  </div>
</div>
