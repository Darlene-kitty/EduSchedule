<div class="min-h-screen bg-gray-100 p-8">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Courses</h1>
      <button (click)="openAddModal()" 
              class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700">
        Add Course
      </button>
    </div>

    <!-- Search -->
    <div class="mb-6">
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (ngModelChange)="filterCourses()"
        placeholder="Search courses..."
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600"
      />
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" class="text-center py-12">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600"></div>
    </div>

    <!-- Courses Grid -->
    <div *ngIf="!isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let course of filteredCourses" 
           class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition-shadow">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h3 class="text-xl font-semibold text-gray-900">{{ course.name }}</h3>
            <p class="text-sm text-gray-500">{{ course.code }}</p>
          </div>
          <span class="bg-purple-100 text-purple-600 px-3 py-1 rounded-full text-sm font-semibold">
            {{ course.credits }} Credits
          </span>
        </div>
        
        <p class="text-gray-600 mb-4">{{ course.description || 'No description' }}</p>
        
        <div class="flex items-center justify-between text-sm text-gray-500 mb-4">
          <span>Semester: {{ course.semester }}</span>
          <span *ngIf="course.teacherName">Teacher: {{ course.teacherName }}</span>
        </div>

        <div class="flex space-x-2">
          <button (click)="openEditModal(course)" 
                  class="flex-1 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Edit
          </button>
          <button (click)="deleteCourse(course.id)" 
                  class="flex-1 bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
            Delete
          </button>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && filteredCourses.length === 0" 
         class="text-center py-12 bg-white rounded-lg shadow">
      <p class="text-gray-500 text-lg">No courses found</p>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div *ngIf="showAddModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-8 max-w-md w-full">
      <h2 class="text-2xl font-bold mb-6">{{ editingCourse ? 'Edit Course' : 'Add Course' }}</h2>
      
      <form (ngSubmit)="saveCourse()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Course Name</label>
          <input
            type="text"
            [(ngModel)]="newCourse.name"
            name="name"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Course Code</label>
          <input
            type="text"
            [(ngModel)]="newCourse.code"
            name="code"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
          <textarea
            [(ngModel)]="newCourse.description"
            name="description"
            rows="3"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600"
          ></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Credits</label>
          <input
            type="number"
            [(ngModel)]="newCourse.credits"
            name="credits"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Semester</label>
          <input
            type="text"
            [(ngModel)]="newCourse.semester"
            name="semester"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600"
          />
        </div>

        <div class="flex space-x-4 mt-6">
          <button
            type="submit"
            class="flex-1 bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700"
          >
            Save
          </button>
          <button
            type="button"
            (click)="closeModal()"
            class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-400"
          >
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
